<h2 data-lang-key="ac_charging_title">AC Charging</h2>

<h3 data-lang-key="ac_pdm_section">Leaf PDM</h3>
<div class="bms-readonly-grid">
    <label data-lang-key="ac_pwm_plug">PWM plug</label>
    <input type="text" id="readPwmPlug" value="0 A" readonly data-bind="pdm_info_220411.pwmPlug">

    <label data-lang-key="ac_charge_plug_status">Charge plug status</label>
    <input type="text" id="readChargePlugStatus" value="0 A" readonly data-bind="pdm_info_220411.chargePlugStatus">

    <label data-lang-key="ac_pdm_temp">PDM temperature</label>
    <input type="text" id="readPdmTemp" value="0 °C" readonly data-bind="pdm_info_220411.pdmTemp">

    <label data-lang-key="ac_charge_current">AC charge current</label>
    <input type="text" id="readAcChargeCurrent" value="0 A" readonly data-bind="pdm_info_220411.acChargeCurrent">
</div>

<hr style="margin: 20px 0;">

<h3 data-lang-key="ac_pcs_section">Tesla M3 PCS</h3>
<div class="bms-readonly-grid">
    <label data-lang-key="pcs_state">PCS state</label>
    <input type="text" id="readPcsState" value="—" readonly data-bind="pcs_state_220418.pcsState">

    <label data-lang-key="pcs_chg_stat">Charger state</label>
    <input type="text" id="readPcsChgStat" value="—" readonly data-bind="pcs_state_220418.chgStat">

    <label data-lang-key="pcs_hw_lim">PCS HW limit</label>
    <input type="text" id="readPcsHwLim" value="0 A" readonly data-bind="pcs_power_22041C.hwAcLim">

    <label data-lang-key="pcs_ac_voltage">AC voltage</label>
    <input type="text" id="readPcsAcVoltage" value="0 V" readonly data-bind="pcs_state_220418.acVoltage">

    <label data-lang-key="pcs_ac_current">AC current</label>
    <input type="text" id="readPcsAcCurrent" value="0 A" readonly data-bind="pcs_ac_220419.acCurrent">

    <label data-lang-key="pcs_ac_power">AC power</label>
    <input type="text" id="readPcsAcPower" value="0 W" readonly data-bind="pcs_ac_220419.acPower">

    <label data-lang-key="pcs_charge_setpoint">Charge power setpoint</label>
    <input type="text" id="readPcsChargeSetpoint" value="0 W" readonly data-bind="pcs_power_22041C.chargePowerSetpoint">

    <label data-lang-key="pcs_hv_voltage">HV voltage</label>
    <input type="text" id="readPcsHvVoltage" value="0 V" readonly data-bind="pcs_hv_temps_22041B.hvVoltage">

    <label data-lang-key="pcs_dcdc_lv">DCDC LV voltage</label>
    <input type="text" id="readPcsDcdcLv" value="0 V" readonly data-bind="pcs_dcdc_22041A.dcdcLv">

    <label data-lang-key="pcs_dcdc_current">DCDC current</label>
    <input type="text" id="readPcsDcdcCurrent" value="0 A" readonly data-bind="pcs_dcdc_22041A.dcdcCurrent">

    <label data-lang-key="pcs_temp_dcdc">DCDC temperature</label>
    <input type="text" id="readPcsTempDcdc" value="0 °C" readonly data-bind="pcs_hv_temps_22041B.tempDcdc">

    <label data-lang-key="pcs_temp_ambient">Ambient temperature</label>
    <input type="text" id="readPcsTempAmbient" value="0 °C" readonly data-bind="pcs_hv_temps_22041B.tempAmbient">

    <label data-lang-key="pcs_dcdc_bus_hv">DCDC bus HV</label>
    <input type="text" id="readPcsDcdcBusHv" value="0 V" readonly data-bind="pcs_dcdcbus_220429.dcdcBusHv">

    <label data-lang-key="pcs_dcdc_bus_lv">DCDC bus LV</label>
    <input type="text" id="readPcsDcdcBusLv" value="0 V" readonly data-bind="pcs_dcdcbus_220429.dcdcBusLv">
</div>

<!-- Open-modal button row.
     Mobile (default): button stays in the LEFT column of the 1fr 1fr grid,
     same width as labels above.
     Desktop (>=768px): button spans BOTH columns and stretches to the full
     width of the parameters grid above. -->
<style>
    @media (min-width: 768px) {
        #pcsDetailsButtonRow #pcsDetailsButton { grid-column: 1 / -1; }
        #pcsDetailsButtonRow .pcs-details-spacer { display: none; }
    }
</style>
<div id="pcsDetailsButtonRow" class="bms-readonly-grid" style="margin-top: 12px; margin-bottom: 0;">
    <button type="button" id="pcsDetailsButton" class="write-button" data-lang-key="pcs_details_btn">PCS details</button>
    <span class="pcs-details-spacer"></span>
</div>

<hr style="margin: 20px 0;">

<h3 data-lang-key="ac_settings_section">Settings</h3>
<div class="rw-grid">
    <label data-lang-key="ac_charge_current_write">Max AC charge current (shared PDM/PCS)</label>
    <input type="text" id="readAcChargeCurrentSet" value="0 A" readonly data-bind="pcs_power_22041C.currentLimit">
    <input type="text" id="writeAcChargeCurrent" placeholder="A">
    <button class="write-button" data-param-name="write_ac_charge_current" data-target-id="writeAcChargeCurrent" data-lang-key="btn_write">Write</button>

    <label>DCDC output voltage (10.0–20.0 V)</label>
    <input type="text" id="readPcsDcdcSetpoint" value="0.0 V" readonly data-bind="pcs_dcdc_setpoint_22042C.dcdcVoltageSetpoint">
    <input type="text" id="writePcsDcdcVoltage" placeholder="V (e.g. 14.2)">
    <button class="write-button" data-param-name="write_pcs_dcdc_voltage" data-target-id="writePcsDcdcVoltage" data-lang-key="btn_write">Write</button>
</div>

<!-- ====== PCS Identity modal ======
     Inline styles instead of relying on global .overlay class so we don't
     inherit quirks from update.html that don't suit a content dialog. -->
<style>
    /* Inline <style> tags ARE executed when injected via innerHTML (only
       <script> tags are skipped), so this scoped rule loads with the page.
       It prevents inputs from establishing a min-content width that would
       overflow the modal grid and produce a horizontal scrollbar. */
    #pcsDetailsOverlay input { min-width: 0; }
</style>
<div id="pcsDetailsOverlay"
     style="display:none; position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center;">
    <div style="background: var(--bg-card); color: var(--text-primary); text-align: left; box-sizing: border-box; width: min(95vw, 760px); max-height: 90vh; overflow: hidden; padding: 40px; border-radius: 10px;">
        <h3 data-lang-key="pcs_details_title" style="color: var(--text-primary); margin-top: 0;">PCS Identity</h3>
        <div class="bms-readonly-grid">
            <label data-lang-key="pcs_part_number">Part number</label>
            <input type="text" id="readPcsPartNumber" value="—" readonly data-bind="pcs_part5_220421.partNumber">

            <label data-lang-key="pcs_serial_number">Serial number</label>
            <input type="text" id="readPcsSerialNumber" value="—" readonly data-bind="pcs_serial4_220425.serialNumber">

            <label data-lang-key="pcs_hardware_id">Hardware ID</label>
            <input type="text" id="readPcsHardwareId" value="—" readonly data-bind="pcs_ids_220426.hardwareId">

            <label data-lang-key="pcs_component_id">Component ID</label>
            <input type="text" id="readPcsComponentId" value="—" readonly data-bind="pcs_ids_220426.componentId">

            <label data-lang-key="pcs_app_crc">Application CRC32</label>
            <input type="text" id="readPcsAppCrc" value="—" readonly data-bind="pcs_appcrc_220427.appCrc">

            <label data-lang-key="pcs_boot_crc">Bootloader CRC32</label>
            <input type="text" id="readPcsBootCrc" value="—" readonly data-bind="pcs_bootcrc_220428.bootCrc">
        </div>

        <h4 data-lang-key="pcs_active_alerts_label" style="margin-top: 20px; margin-bottom: 8px; color: var(--text-primary);">Active PCS alerts:</h4>
        <div style="padding: 8px 12px; background: var(--bg-input, rgba(255,255,255,0.05)); border-radius: 6px; color: var(--text-primary); font-size: 0.95em; word-break: break-word; min-height: 1.4em;">
            <span data-bind="pcs_alert_p0a_22042D.activeAlerts">—</span>
        </div>

        <div style="margin-top: 20px; display: flex; justify-content: center;">
            <!-- width: auto overrides .write-button { width: 100% } default -->
            <button type="button" id="pcsDetailsCloseButton" class="write-button" style="width: auto; min-width: 220px;" data-lang-key="btn_close">Close</button>
        </div>
    </div>

    <!-- Hidden bindings to drive the part-number / serial-number polling.
         ui.js getRequiredKeysFromDOM scans [data-bind] regardless of visibility,
         so these invisible inputs keep the 4 part-number slices and 3 extra
         serial-number slices polled even though only the final joined value is
         shown above. The overlay itself is also display:none until opened —
         polling still happens because the query selector ignores visibility. -->
    <div style="display:none">
        <input type="text" data-bind="pcs_part1_22041D.partNumber">
        <input type="text" data-bind="pcs_part2_22041E.partNumber">
        <input type="text" data-bind="pcs_part3_22041F.partNumber">
        <input type="text" data-bind="pcs_part4_220420.partNumber">
        <input type="text" data-bind="pcs_serial1_220422.serialNumber">
        <input type="text" data-bind="pcs_serial2_220423.serialNumber">
        <input type="text" data-bind="pcs_serial3_220424.serialNumber">
    </div>
</div>

<!-- ====== PCS active alerts (decoded from PCS_alertMatrix 0x3A4) ======
     A single live line listing every alert flag currently set on either page.
     Bound to .activeAlerts on the FIRST sub-DID; the other three are kept in
     hidden inputs so polling continues for all four matrix slices. The parser
     in parameterRegistry.js recomputes the joined string after every slice,
     so updates appear at most one poll interval (1 s) after a bit changes. -->
<div id="pcsActiveAlertsRow"
     style="margin-top: 20px; padding: 10px 14px; background: var(--bg-card); border-radius: 6px; color: var(--text-primary); font-size: 0.95em; word-break: break-word;">
    <strong data-lang-key="pcs_active_alerts_label">Active PCS alerts:</strong>
    <span id="readPcsActiveAlerts" data-bind="pcs_alert_p0a_22042D.activeAlerts">—</span>
</div>
<div style="display:none">
    <input type="text" data-bind="pcs_alert_p0b_22042E.activeAlerts">
    <input type="text" data-bind="pcs_alert_p1a_22042F.activeAlerts">
    <input type="text" data-bind="pcs_alert_p1b_220430.activeAlerts">
</div>

<!-- NB: open/close handlers are wired by modules/acChargingPage.js, NOT by an
     inline <script> tag. Inline scripts inside HTML loaded via innerHTML are
     never executed by the browser. ui.js loadPage() calls initAcChargingPage()
     after the page is injected. -->
